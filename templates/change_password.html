{% extends "base.html" %}
{% block title %}Change Password — CSP Analyzer{% endblock %}

{% block content %}
<div class="max-w-md">
  <h1 class="text-xl font-semibold mb-6">Change Password</h1>

  {% if error %}
  <div class="mb-4 p-3 rounded-lg text-sm" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#ef4444">{{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="mb-4 p-3 rounded-lg text-sm" style="background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#22c55e">Password changed successfully.</div>
  {% endif %}

  <div class="card">
    <form method="POST" action="/auth/change-password">
      <div class="mb-4">
        <label class="block mb-1.5 text-xs font-medium text-muted uppercase tracking-wide">Current Password</label>
        <input type="password" name="current_password" required />
      </div>
      <div class="mb-4">
        <label class="block mb-1.5 text-xs font-medium text-muted uppercase tracking-wide">New Password</label>
        <input type="password" name="new_password" required minlength="8" />
      </div>
      <div class="mb-6">
        <label class="block mb-1.5 text-xs font-medium text-muted uppercase tracking-wide">Confirm New Password</label>
        <input type="password" name="confirm_password" required minlength="8" />
      </div>
      <button type="submit" class="btn btn-accent">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
