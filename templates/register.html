<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CSP Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f4f6f8; color: #e5e7eb; font-family: 'DM Sans', sans-serif; }
    input { background: #002b66; border: 1px solid #2a2d3a; color: #e5e7eb; border-radius: 0.5rem; padding: 0.625rem 0.875rem; width: 100%; font-size: 0.9rem; transition: border-color 0.15s; }
    input:focus { outline: none; border-color: #0047bb; box-shadow: 0 0 0 2px rgba(0,212,170,0.15); }
    label { font-size: 0.8rem; color: #9ca3af; font-weight: 500; letter-spacing: 0.03em; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-3" style="background:rgba(0,212,170,0.15)">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0047bb" stroke-width="2" class="w-6 h-6"><path d="M3 3h18v18H3zM9 9l6 6M15 9l-6 6"/></svg>
      </div>
      <h1 class="text-xl font-semibold">CSP Analyzer</h1>
      <p class="text-sm mt-1" style="color:#6b7280">Create your account</p>
    </div>

    <!-- Card -->
    <div style="background:#ffffff;border:1px solid #2a2d3a;border-radius:0.875rem;padding:2rem">
      {% if error %}
      <div class="mb-4 p-3 rounded-lg text-sm" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#ef4444">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/auth/register">
        <div class="mb-4">
          <label for="username" class="block mb-1.5">USERNAME</label>
          <input type="text" id="username" name="username" required autofocus placeholder="johndoe" />
        </div>
        <div class="mb-4">
          <label for="email" class="block mb-1.5">EMAIL</label>
          <input type="email" id="email" name="email" required placeholder="john@example.com" />
        </div>
        <div class="mb-6">
          <label for="password" class="block mb-1.5">PASSWORD</label>
          <input type="password" id="password" name="password" required placeholder="••••••••" minlength="8" />
        </div>
        <button type="submit" class="w-full py-2.5 rounded-lg font-semibold text-sm cursor-pointer transition-all mb-4" style="background:#0047bb;color:#f4f6f8" onmouseover="this.style.background='#003388'" onmouseout="this.style.background='#0047bb'">
          Sign Up
        </button>
      </form>

      <div class="flex items-center my-4 before:flex-1 before:border-t before:border-gray-200 after:flex-1 after:border-t after:border-gray-200">
        <span class="px-3 text-xs text-gray-500 uppercase">Or continue with</span>
      </div>

      <a href="/auth/login/google" class="w-full flex items-center justify-center gap-2 py-2.5 rounded-lg font-semibold text-sm cursor-pointer transition-all border border-gray-300 hover:bg-gray-50 text-gray-700">
        <svg class="w-4 h-4" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </a>

      <div class="mt-6 text-center text-sm">
        <span style="color:#6b7280">Already have an account?</span>
        <a href="/auth/login" class="font-medium hover:underline" style="color:#0047bb">Sign In</a>
      </div>
    </div>
  </div>
</body>
</html>
