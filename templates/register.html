<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Options Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #0f172a;
      background-image: radial-gradient(circle at top right, #334155, #0f172a);
      color: #f8fafc;
      font-family: 'DM Sans', sans-serif;
    }
    input {
      background: #ffffff !important;
      border: 2px solid #cbd5e1;
      color: #000000 !important;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      width: 100%;
      font-size: 1.1rem;
      transition: all 0.2s;
      font-weight: 700;
    }
    input:focus {
      outline: none;
      border-color: #64748b;
      box-shadow: 0 0 0 4px rgba(100, 116, 139, 0.1);
    }
    .card-shadow {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <!-- Main Registration Card -->
    <div class="overflow-hidden rounded-2xl card-shadow border border-slate-700 bg-white">
      
      <!-- Hero Header -->
      <div class="relative w-full aspect-video overflow-hidden border-b border-slate-100">
        <img src="/static/img/login_hero_silver.jpg" alt="Secure Terminal" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-6">
          <div class="text-white">
            <h1 class="text-3xl font-bold tracking-tight" style="font-family:'Playfair Display', serif">Options Portal</h1>
            <p class="text-xs uppercase tracking-[0.3em] font-bold text-slate-300 mt-1">Terminal Access Request</p>
          </div>
        </div>
      </div>

      <div class="p-10">
        {% if error %}
        <div class="mb-8 p-4 rounded-xl text-sm font-medium bg-red-50 border border-red-100 text-red-600 flex items-center gap-3">
          <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
          {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/auth/register" class="space-y-6">
          <div>
            <label for="username" class="block mb-2 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">User Identifier</label>
            <input type="text" id="username" name="username" required autofocus placeholder="Choose a User ID">
          </div>

          <div>
            <label for="email" class="block mb-2 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Contact Email</label>
            <input type="email" id="email" name="email" required placeholder="name@company.com">
          </div>
          
          <div>
            <label for="password" class="block mb-2 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Secure Access Key</label>
            <input type="password" id="password" name="password" required placeholder="Minimum 8 characters" minlength="8">
          </div>

          <button type="submit" class="w-full py-4 rounded-xl font-bold text-sm tracking-widest uppercase cursor-pointer transition-all bg-slate-800 text-white hover:bg-black active:scale-[0.98] shadow-lg shadow-slate-200">
            Request Authorization
          </button>
        </form>

        <!-- Footer Actions -->
        <div class="mt-10 pt-8 border-t border-slate-100">
          <div class="flex flex-col gap-4 text-center">
            <div class="text-sm">
              <span class="text-slate-500">Already authorized?</span>
              <a href="/auth/login" class="ml-1 font-bold text-slate-900 hover:text-slate-700 transition-colors">Return to Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Disclaimer -->
    <div class="mt-8 text-center space-y-1">
      <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Powered by TradePort Intelligence</p>
      <p class="text-[9px] text-slate-600">Secure 256-bit AES Encrypted Environment</p>
    </div>
  </div>
</body>
</html>
